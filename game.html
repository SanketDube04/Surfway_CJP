<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subway Surfers — WebGL</title>
  <meta name="description" content="3D Subway Surfers game built with WebGL. Dodge obstacles, collect coins, and outrun the police!">
  <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
  <!-- WebGL Canvas -->
  <canvas id="glcanvas" width="1024" height="800"></canvas>

  <!-- ── Start / Game-Over Modal ─────────────────────────────────────────── -->
  <div id="ModalBox" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
      <p class="game_title">Subway Surfers</p>
      <p class="game_tagline">WebGL Edition</p>

      <!-- Score shown on game over -->
      <p class="game_score" id="game_score_display">
        Your Score
        <span id="final_score_value">0</span>
      </p>

      <!-- Play button (triangle arrow) -->
      <div class="play-btn" id="arrow" title="Start game" aria-label="Start game"></div>

      <!-- Play Again shown after game over -->
      <button class="play_again" id="play_again" aria-label="Play again">↩ Play Again</button>

      <!-- Key hints -->
      <div class="key-hints">
        <span class="key-hint-item"><kbd>A</kbd> / <kbd>←</kbd> Left</span>
        <span class="key-hint-item"><kbd>D</kbd> / <kbd>→</kbd> Right</span>
        <span class="key-hint-item"><kbd>Space</kbd> Jump</span>
        <span class="key-hint-item"><kbd>F</kbd> Flash · <kbd>B</kbd> Grayscale</span>
      </div>
    </div>
  </div>

  <!-- ── HUD ─────────────────────────────────────────────────────────────── -->
  <div id="GameScore" class="score" role="status" aria-live="polite">
    <div class="hud-card">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Cockroaches</div>
      <div class="hud-value" id="coins-val">0</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Speed</div>
      <div class="hud-value" id="speed-val">1×</div>
    </div>
  </div>

  <!-- Police danger banner (hidden until police chases) -->
  <div id="police-warning" style="display:none; position:absolute; bottom:70px; left:50%; transform:translateX(-50%); z-index:15;">
    <div style="background:rgba(180,0,0,0.82); border:1px solid rgba(255,80,80,0.5); border-radius:12px; padding:10px 26px; backdrop-filter:blur(10px); text-align:center;">
      <span style="font-family:'Outfit',sans-serif; font-size:15px; font-weight:800; color:#fff; letter-spacing:2px;">🚔 POLICE INCOMING!</span>
      <div id="police-gap-bar" style="margin-top:6px; height:5px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden;">
        <div id="police-gap-fill" style="height:100%; width:100%; background:linear-gradient(90deg,#ff4444,#ff9900); border-radius:3px; transition:width 0.15s;"></div>
      </div>
    </div>
  </div>

  <!-- ── Game End Video Overlay (hidden until police catches player) ──── -->
  <div id="video-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100; justify-content:center; align-items:center;">
    <video id="game-end-video" style="max-width:100%; max-height:100%; object-fit:contain;" preload="auto">
      <source src="assets/asset_custom/GameEndVideo.mp4" type="video/mp4">
    </video>
  </div>

</body>

<!-- ── Game UI logic ────────────────────────────────────────────────────── -->
<script type="text/javascript">
  var modal   = document.getElementById('ModalBox');
  var scoreEl = document.getElementById('GameScore');
  var music;
  music = new sound('assets/asset_custom/bg_song.mpeg');

  // ── Sound helper ──────────────────────────────────────────────────────
  function sound(src) {
    this.sound = document.createElement('audio');
    this.sound.src = src;
    this.sound.setAttribute('preload', 'auto');
    this.sound.setAttribute('controls', 'none');
    this.sound.style.display = 'none';
    document.body.appendChild(this.sound);
    this.play  = function () { this.sound.play();  };
    this.stop  = function () { this.sound.pause(); };
  }

  // ── Initial start modal ───────────────────────────────────────────────
  function start() {
    modal.style.display = 'flex';
    document.querySelector('.game_title').textContent = 'Subway Surfers';
    document.querySelector('.game_tagline').textContent = 'WebGL Edition';
    document.getElementById('game_score_display').style.display = 'none';
    document.getElementById('play_again').style.display  = 'none';
    document.getElementById('arrow').style.display       = 'flex';
  }

  // ── Start game ────────────────────────────────────────────────────────
  document.getElementById('arrow').addEventListener('click', function () {
    game_start = true;
    music.play();
    modal.style.display    = 'none';
    scoreEl.style.display  = 'flex';
  });

  // ── Restart ───────────────────────────────────────────────────────────
  document.getElementById('play_again').addEventListener('click', function () {
    document.location.reload();
  });

  // ── Update HUD ────────────────────────────────────────────────────────
  var _lastScore = -1;
  function update_score() {
    if (typeof objects === 'undefined' || !objects[0]) return;
    var s = objects[0].score;

    document.getElementById('score-val').textContent = s * 10;
    document.getElementById('coins-val').textContent = s;

    // Speed indicator: 1× baseline at 0.075
    var lvl = Math.round((speed / 0.075) * 10) / 10;
    document.getElementById('speed-val').textContent = lvl.toFixed(1) + '×';

    // Police warning banner
    var policeWarn = document.getElementById('police-warning');
    if (objects[1] && objects[1].chasing) {
      policeWarn.style.display = 'block';
      var gapPct = Math.min(100, Math.max(0, (objects[1].gap / 2.5) * 100));
      document.getElementById('police-gap-fill').style.width = gapPct + '%';
    } else {
      policeWarn.style.display = 'none';
    }

    // Pop animation on new coin
    if (s !== _lastScore) {
      _lastScore = s;
      var el = document.getElementById('coins-val');
      el.classList.remove('hud-pop');
      void el.offsetWidth; // reflow
      el.classList.add('hud-pop');
    }
  }

  // ── Game Over ─────────────────────────────────────────────────────────
  var _gameOverShown = false;
  function Game_over() {
    if (_gameOverShown) return;
    _gameOverShown = true;

    music.stop();
    scoreEl.style.display = 'none';
    document.getElementById('police-warning').style.display = 'none';

    // Play the game-end video first
    var videoOverlay = document.getElementById('video-overlay');
    var video = document.getElementById('game-end-video');

    videoOverlay.style.display = 'flex';
    video.currentTime = 0;
    video.play().catch(function() {
      // If autoplay is blocked, skip straight to score modal
      showGameOverModal();
    });

    // When video ends, show the score modal
    video.onended = function() {
      videoOverlay.style.display = 'none';
      showGameOverModal();
    };

    // Allow clicking/tapping to skip the video
    videoOverlay.onclick = function() {
      video.pause();
      videoOverlay.style.display = 'none';
      showGameOverModal();
    };
  }

  // ── Show the final score modal (called after video ends) ──────────────
  function showGameOverModal() {
    modal.style.display = 'flex';

    var titleEl = document.querySelector('.game_title');
    titleEl.textContent = '💀 Game Over';
    document.querySelector('.game_tagline').textContent = 'Better luck next time!';

    var scoreDisplay = document.getElementById('game_score_display');
    scoreDisplay.style.display = 'block';
    document.getElementById('final_score_value').textContent =
      (typeof objects !== 'undefined' && objects[0]) ? objects[0].score * 10 : 0;

    document.getElementById('arrow').style.display      = 'none';
    document.getElementById('play_again').style.display = 'inline-block';
  }

  // Boot
  start();
</script>

<!-- ── Libraries ────────────────────────────────────────────────────────── -->

<script src="./libs/jquery-3.3.1.min.js"></script>
